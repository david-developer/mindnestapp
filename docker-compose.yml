services:
  db:
    image: postgres:16
    container_name: mindnest_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: engineerdavid
      POSTGRES_PASSWORD: bigengineer
      POSTGRES_DB: mindnest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: